<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y6 LLC — Account Transaction Review</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EE;
    --surface: #FDFCF9;
    --border: #D8D2C4;
    --border-strong: #B8B0A0;
    --text-primary: #1A1714;
    --text-secondary: #6B6459;
    --text-muted: #9B9188;
    --accent: #2D5A3D;
    --accent-light: #E8F0EB;
    --accent-mid: #C4D9CA;
    --warning: #8B4A0E;
    --warning-light: #FDF0E6;
    --warning-mid: #F0C89A;
    --danger: #8B1A1A;
    --danger-light: #FDF0F0;
    --danger-mid: #F0BCBC;
    --blue: #1A3A5C;
    --blue-light: #E8EEF5;
    --blue-mid: #B8CCDF;
    --tag-bg: #ECEAE4;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --radius: 4px;
    --radius-lg: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--text-primary);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .header-left h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: white;
  }
  .header-left p {
    font-size: 11px;
    color: #9B9991;
    margin-top: 2px;
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }
  .header-stats {
    display: flex;
    gap: 24px;
  }
  .stat-pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: #CCC8C0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill .num {
    font-size: 13px;
    font-weight: 600;
    color: white;
  }
  .stat-pill.warning-stat .num { color: #F0C89A; }
  .stat-pill.feedback-stat .num { color: #A8C8B8; }

  /* ── CONTROLS BAR ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 340px;
  }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
  }
  .search-input {
    width: 100%;
    padding: 8px 10px 8px 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
  .filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .filter-btn.active {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: white;
  }
  .filter-btn.warning-btn.active {
    background: var(--warning);
    border-color: var(--warning);
    color: white;
  }
  .filter-btn.feedback-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .controls-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .export-btn {
    padding: 7px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .export-btn:hover { opacity: 0.85; }

  /* ── MAIN LAYOUT ── */
  .main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* ── SECTION HEADERS ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    margin-top: 8px;
  }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
  }
  .section-label.multi-label {
    background: var(--warning);
    color: white;
  }
  .section-label.single-label {
    background: var(--text-primary);
    color: white;
  }
  .section-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }

  /* ── CONTACT CARD ── */
  .contact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .contact-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    border-color: var(--border-strong);
  }
  .contact-card.multi-account {
    border-color: var(--warning-mid);
    border-left: 3px solid var(--warning);
  }
  .contact-card.has-feedback { border-color: var(--accent-mid); }
  .contact-card.hidden { display: none; }

  .card-header {
    padding: 14px 16px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .contact-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.35;
    flex: 1;
  }
  .card-badges { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 2px;
  }
  .badge-multi { background: var(--warning-light); color: var(--warning); border: 1px solid var(--warning-mid); }
  .badge-count { background: var(--tag-bg); color: var(--text-secondary); }
  .badge-reviewed { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-mid); }

  /* ── ACCOUNT ROWS ── */
  .accounts-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

  .account-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .account-row-header {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .account-row-header:hover { background: rgba(0,0,0,0.02); }
  .account-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--border-strong);
  }
  .account-name-label {
    flex: 1;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .account-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .txn-badge {
    background: var(--tag-bg);
    padding: 2px 6px;
    border-radius: 2px;
    font-size: 9px;
  }
  .expand-arrow {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
    margin-left: 4px;
  }
  .account-row.expanded .expand-arrow { transform: rotate(90deg); }

  /* Transaction table */
  .txn-table-wrap {
    display: none;
    padding: 0 12px 10px;
    border-top: 1px solid var(--border);
  }
  .account-row.expanded .txn-table-wrap { display: block; }
  .txn-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 10px;
  }
  .txn-table th {
    text-align: left;
    padding: 6px 4px 4px;
    color: var(--text-muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .txn-table td {
    padding: 4px 4px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .txn-table tr:last-child td { border-bottom: none; }
  .txn-table .debit { color: var(--danger); }
  .txn-table .credit { color: var(--accent); }
  .txn-table .amount-cell { text-align: right; }

  /* Account total row */
  .account-totals {
    display: flex;
    justify-content: flex-end;
    gap: 16px;
    padding: 6px 0 0;
    border-top: 1px solid var(--border);
    margin-top: 4px;
    font-family: var(--mono);
    font-size: 10px;
  }
  .total-item { display: flex; gap: 5px; }
  .total-label { color: var(--text-muted); }
  .total-debit { color: var(--danger); font-weight: 600; }
  .total-credit { color: var(--accent); font-weight: 600; }

  /* ── FEEDBACK SECTION ── */
  .feedback-section {
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.01);
  }
  .feedback-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .feedback-existing {
    background: var(--accent-light);
    border: 1px solid var(--accent-mid);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 7px;
    line-height: 1.4;
  }
  .feedback-existing .fb-icon { flex-shrink: 0; margin-top: 1px; }
  .feedback-existing .fb-text { flex: 1; }
  .feedback-existing .fb-clear {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .feedback-existing .fb-clear:hover { opacity: 1; }

  .feedback-controls { display: flex; gap: 6px; }
  .feedback-input {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 12px;
    background: var(--surface);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
    resize: none;
  }
  .feedback-input:focus { border-color: var(--accent); }
  .feedback-input::placeholder { color: var(--text-muted); }

  .feedback-actions { display: flex; flex-direction: column; gap: 5px; }
  .suggest-wrap { position: relative; }
  .suggest-btn {
    padding: 7px 12px;
    background: var(--blue-light);
    border: 1px solid var(--blue-mid);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    color: var(--blue);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .suggest-btn:hover { background: var(--blue-mid); }
  .submit-btn {
    padding: 7px 12px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    color: white;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    letter-spacing: 0.02em;
  }
  .submit-btn:hover { opacity: 0.85; }

  /* Account suggestion dropdown */
  .account-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 200;
    min-width: 260px;
    max-height: 220px;
    overflow-y: auto;
  }
  .account-dropdown.open { display: block; }
  .dropdown-header {
    padding: 8px 12px 6px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
  }
  .dropdown-item {
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-primary);
    cursor: pointer;
    transition: background 0.1s;
  }
  .dropdown-item:hover { background: var(--accent-light); color: var(--accent); }

  /* Quick suggest chips */
  .quick-suggests {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .quick-chip {
    font-size: 10px;
    padding: 3px 8px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.12s;
    font-family: var(--sans);
  }
  .quick-chip:hover {
    background: var(--blue-light);
    border-color: var(--blue-mid);
    color: var(--blue);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 32px;
    background: var(--text-primary);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-lg);
    font-size: 13px;
    font-family: var(--sans);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    border-left: 3px solid var(--accent);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* ── COMPANY SWITCHER ── */
  .company-switcher {
    display: flex;
    gap: 4px;
    width: 100%;
  }
  .controls-sub {
    border-top: none;
    padding-top: 10px;
  }
  .company-btn {
    padding: 8px 22px;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    background: var(--bg);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
    position: relative;
    bottom: -1px;
  }
  .company-btn:hover { background: var(--surface); color: var(--text-primary); }
  .company-btn.active {
    background: var(--surface);
    color: var(--text-primary);
    font-weight: 600;
    border-color: var(--border);
    border-bottom-color: var(--surface);
    z-index: 1;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <h1 id="companyTitle">Account Transaction Review</h1>
    <p>Fiscal Year 2025 &nbsp;·&nbsp; January 1 – December 31, 2025</p>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="num" id="stat-total">—</span> Contacts</div>
    <div class="stat-pill warning-stat"><span class="num" id="stat-multi">—</span> Multiple Accounts</div>
    <div class="stat-pill feedback-stat"><span class="num" id="stat-feedback">0</span> Reviewed</div>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="company-switcher" id="companySwitcher">
    <button class="company-btn active" data-company="y6" onclick="switchCompany('y6', this)">Y6 LLC (fka Newbie LLC)</button>
    <button class="company-btn" data-company="t2" onclick="switchCompany('t2', this)">T2 Consulting, LLC</button>
  </div>
</div>
<div class="controls controls-sub">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Search contacts or accounts…">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">All Contacts</button>
    <button class="filter-btn warning-btn" data-filter="multi">⚠ Multiple Accounts</button>
    <button class="filter-btn feedback-btn" data-filter="reviewed">✓ Reviewed</button>
    <button class="filter-btn" data-filter="pending">Pending Review</button>
  </div>
  <div class="controls-right">
    <input class="search-input" type="text" id="reviewerName" placeholder="Your name (Reviewer)" style="max-width:180px;">
    <button class="export-btn" onclick="viewSheet()">📊 View Sheet</button>
  </div>
</div>

<!-- MAIN -->
<main class="main">

  <!-- MULTI-ACCOUNT SECTION -->
  <div id="multiSection">
    <div class="section-header">
      <span class="section-label multi-label">⚠ Needs Attention</span>
      <div class="section-divider"></div>
      <span class="section-count" id="multiCount"></span>
    </div>
    <div class="cards-grid" id="multiGrid"></div>
  </div>

  <!-- SINGLE-ACCOUNT SECTION -->
  <div id="singleSection">
    <div class="section-header">
      <span class="section-label single-label">Single Account</span>
      <div class="section-divider"></div>
      <span class="section-count" id="singleCount"></span>
    </div>
    <div class="cards-grid" id="singleGrid"></div>
  </div>

  <div class="empty-state" id="emptyState">
    <h3>No contacts found</h3>
    <p>Try adjusting your search or filter</p>
  </div>

</main>

<div class="toast" id="toast"></div>

// State
const feedbackStore = {};
let currentFilter = 'all';
let currentSearch = '';

function fmt(n) {
  if (n === 0) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function makeContactId(contact) {
  return 'c_' + btoa(encodeURIComponent(contact)).replace(/[^a-zA-Z0-9]/g, '');
}

function buildCard(item) {
  const id = makeContactId(item.contact);
  const isMulti = item.num_accounts > 1;
  const totalTxns = item.accounts.reduce((s, a) => s + a.txn_count, 0);

  let accountsHTML = '';
  item.accounts.forEach((acc, ai) => {
    const rowId = id + '_acc_' + ai;
    let txnRows = acc.transactions.map(t => `
      <tr>
        <td>${t.date}</td>
        <td class="amount-cell ${t.debit > 0 ? 'debit' : ''}">${t.debit > 0 ? fmt(t.debit) : '—'}</td>
        <td class="amount-cell ${t.credit > 0 ? 'credit' : ''}">${t.credit > 0 ? fmt(t.credit) : '—'}</td>
      </tr>`).join('');

    accountsHTML += `
      <div class="account-row" id="${rowId}">
        <div class="account-row-header" onclick="toggleRow('${rowId}')">
          <div class="account-dot"></div>
          <span class="account-name-label">${acc.name}</span>
          <div class="account-meta">
            <span class="txn-badge">${acc.txn_count} txn${acc.txn_count !== 1 ? 's' : ''}</span>
            <span>▶</span>
          </div>
          <span class="expand-arrow">▶</span>
        </div>
        <div class="txn-table-wrap">
          <table class="txn-table">
            <thead><tr><th>Date</th><th class="amount-cell">Debit</th><th class="amount-cell">Credit</th></tr></thead>
            <tbody>${txnRows}</tbody>
          </table>
          <div class="account-totals">
            ${acc.total_debit > 0 ? `<div class="total-item"><span class="total-label">Total Debit:</span><span class="total-debit">${fmt(acc.total_debit)}</span></div>` : ''}
            ${acc.total_credit > 0 ? `<div class="total-item"><span class="total-label">Total Credit:</span><span class="total-credit">${fmt(acc.total_credit)}</span></div>` : ''}
          </div>
        </div>
      </div>`;
  });

  const cardHTML = `
    <div class="contact-card ${isMulti ? 'multi-account' : ''}" id="${id}" data-contact="${escapeAttr(item.contact)}" data-accounts="${escapeAttr(item.accounts.map(a=>a.name).join('|'))}">
      <div class="card-header">
        <div class="contact-name">${escapeHtml(item.contact)}</div>
        <div class="card-badges">
          ${isMulti ? `<span class="badge badge-multi">⚠ ${item.num_accounts} Accounts</span>` : ''}
          <span class="badge badge-count">${totalTxns} txn${totalTxns !== 1 ? 's' : ''}</span>
        </div>
      </div>
      <div class="accounts-list">${accountsHTML}</div>
      <div class="feedback-section">
        <div class="feedback-label">📝 Reviewer Feedback</div>
        <div class="feedback-existing" id="fb_existing_${id}" style="display:none">
          <span class="fb-icon">✓</span>
          <span class="fb-text" id="fb_text_${id}"></span>
          <button class="fb-clear" onclick="clearFeedback('${id}')">✕</button>
        </div>
        <div id="fb_input_wrap_${id}">
          <div class="feedback-controls">
            <textarea class="feedback-input" id="fb_input_${id}" rows="2" placeholder="e.g. This should be categorized under General Maintenance instead of Repairs and Maintenance…"></textarea>
            <div class="feedback-actions">
              <div class="suggest-wrap">
                <button class="suggest-btn" onclick="toggleDropdown('${id}')">Suggest Account ▾</button>
                <div class="account-dropdown" id="dd_${id}">
                  <div class="dropdown-header">Select Correct Account</div>
                  ${ALL_ACCOUNTS.map(a => `<div class="dropdown-item" onclick="selectAccount('${id}', '${escapeAttr(a)}')">${a}</div>`).join('')}
                </div>
              </div>
              <button class="submit-btn" onclick="submitFeedback('${id}', '${escapeAttr(item.contact)}')">Save ✓</button>
            </div>
          </div>
          <div class="quick-suggests">
            <span style="font-size:10px;color:var(--text-muted);padding:3px 0;font-family:var(--mono)">Quick:</span>
            ${['General Maintenance','Repairs and Maintenance- Talbert','Repairs and Maintenance - Poplar','Utilities','Professional Fees'].map(a => `<span class="quick-chip" onclick="selectAccount('${id}', '${escapeAttr(a)}')">${a}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>`;

  return cardHTML;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function toggleRow(rowId) {
  const row = document.getElementById(rowId);
  row.classList.toggle('expanded');
}

function toggleDropdown(id) {
  const dd = document.getElementById('dd_' + id);
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.account-dropdown.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) dd.classList.add('open');
}

function selectAccount(id, account) {
  const input = document.getElementById('fb_input_' + id);
  const current = input.value.trim();
  const prefix = 'Suggested account: ';
  // Replace or prepend suggestion
  if (current.startsWith(prefix)) {
    input.value = prefix + account + (current.includes('\n') ? current.substring(current.indexOf('\n')) : '');
  } else {
    input.value = prefix + account + (current ? '\n' + current : '');
  }
  document.getElementById('dd_' + id).classList.remove('open');
  input.focus();
}

function submitFeedback(id, contact) {
  const input = document.getElementById('fb_input_' + id);
  const text = input.value.trim();
  if (!text) { showToast('Please enter a note before saving.'); return; }

  const reviewer = document.getElementById('reviewerName').value.trim() || 'Anonymous';
  const ts = new Date().toISOString();
  const companyNames = { y6: 'Y6 LLC (fka Newbie LLC)', t2: 'T2 Consulting, LLC' };
  const company = companyNames[currentCompany] || currentCompany;

  // Optimistic UI update first
  feedbackStore[contact] = { text, ts, reviewer, company };
  document.getElementById('fb_text_' + id).textContent = `[${reviewer} · ${company}]: ${text}`;
  document.getElementById('fb_existing_' + id).style.display = 'flex';
  input.value = '';

  const card = document.getElementById(id);
  card.classList.add('has-feedback');
  const existing = card.querySelector('.badge-reviewed');
  if (!existing) {
    card.querySelector('.card-badges').insertAdjacentHTML('afterbegin', '<span class="badge badge-reviewed">✓ Reviewed</span>');
  }
  updateStats();

  // Save to Google Sheets
  const submitBtn = card.querySelector('.submit-btn');
  submitBtn.textContent = 'Saving…';
  submitBtn.disabled = true;

  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyd1fVcGr0hlEoJrDB3gOJby1dJ4dPHTDORfss4QV6iHxy7qess1w_a44b5BILC2R_XhQ/exec';

  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contact, feedback: text, timestamp: ts, reviewer, company })
  })
  .then(() => {
    showToast('✓ Saved to Google Sheet — ' + contact.substring(0, 28) + (contact.length > 28 ? '…' : ''));
  })
  .catch(() => {
    showToast('⚠ Saved locally only — check your connection.');
  })
  .finally(() => {
    submitBtn.textContent = 'Save ✓';
    submitBtn.disabled = false;
  });
}

function clearFeedback(id) {
  const card = document.getElementById(id);
  const contact = card.getAttribute('data-contact');
  delete feedbackStore[contact];
  document.getElementById('fb_existing_' + id).style.display = 'none';
  card.classList.remove('has-feedback');
  const badge = card.querySelector('.badge-reviewed');
  if (badge) badge.remove();
  updateStats();
}

function updateStats() {
  document.getElementById('stat-feedback').textContent = Object.keys(feedbackStore).length;
  applyFilter();
}

function viewSheet() {
  window.open('https://docs.google.com/spreadsheets/d/1p0jqRQWXSdrOwoWhyyRtmhj968NJOWMt4Iz7omzjqlY/edit', '_blank');
  showToast('Opening Google Sheet…');
}

function applyFilter() {
  const search = currentSearch.toLowerCase();
  const filter = currentFilter;

  let visibleMulti = 0, visibleSingle = 0;
  let totalVisible = 0;

  document.querySelectorAll('.contact-card').forEach(card => {
    const contact = card.getAttribute('data-contact').toLowerCase();
    const accounts = card.getAttribute('data-accounts').toLowerCase();
    const isMulti = card.classList.contains('multi-account');
    const hasReview = card.classList.contains('has-feedback');

    const matchSearch = !search || contact.includes(search) || accounts.includes(search);
    let matchFilter = true;
    if (filter === 'multi') matchFilter = isMulti;
    else if (filter === 'reviewed') matchFilter = hasReview;
    else if (filter === 'pending') matchFilter = !hasReview;

    const visible = matchSearch && matchFilter;
    card.classList.toggle('hidden', !visible);
    if (visible) {
      totalVisible++;
      if (isMulti) visibleMulti++; else visibleSingle++;
    }
  });

  document.getElementById('multiCount').textContent = visibleMulti + ' contact' + (visibleMulti !== 1 ? 's' : '');
  document.getElementById('singleCount').textContent = visibleSingle + ' contact' + (visibleSingle !== 1 ? 's' : '');
  document.getElementById('multiSection').style.display = visibleMulti === 0 && filter !== 'all' ? 'none' : '';
  document.getElementById('singleSection').style.display = visibleSingle === 0 ? 'none' : '';
  document.getElementById('emptyState').classList.toggle('visible', totalVisible === 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}



let currentCompany = 'y6';

function switchCompany(company, btn) {
  if (currentCompany === company) return;
  currentCompany = company;

  // Update tab buttons
  document.querySelectorAll('.company-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Update title
  const titles = { y6: 'Y6 LLC (fka Newbie LLC) — Account Transaction Review', t2: 'T2 Consulting, LLC — Account Transaction Review' };
  document.getElementById('companyTitle').textContent = titles[company];

  // Clear grids
  document.getElementById('multiGrid').innerHTML = '';
  document.getElementById('singleGrid').innerHTML = '';
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-filter') === 'all'));

  // Load company data
  loadCompany(company);
}

function loadCompany(company) {
  const source = company === 'y6' ? DATA : T2_DATA;
  const contacts = source.contacts;
  const multiContacts = contacts.filter(c => c.num_accounts > 1);
  const singleContacts = contacts.filter(c => c.num_accounts === 1);

  const multiGrid = document.getElementById('multiGrid');
  const singleGrid = document.getElementById('singleGrid');

  multiContacts.forEach(c => { multiGrid.insertAdjacentHTML('beforeend', buildCard(c)); });
  singleContacts.forEach(c => { singleGrid.insertAdjacentHTML('beforeend', buildCard(c)); });

  document.getElementById('stat-total').textContent = contacts.length;
  document.getElementById('stat-multi').textContent = multiContacts.length;
  document.getElementById('stat-feedback').textContent = 0;
  document.getElementById('multiCount').textContent = multiContacts.length + ' contacts';
  document.getElementById('singleCount').textContent = singleContacts.length + ' contacts';
  applyFilter();
}

// Init
(function init() {
  document.getElementById('companyTitle').textContent = 'Y6 LLC (fka Newbie LLC) — Account Transaction Review';
  loadCompany('y6');

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value;
    applyFilter();
  });

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      applyFilter();
    });
  });

  // Close dropdowns on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.suggest-wrap')) {
      document.querySelectorAll('.account-dropdown.open').forEach(d => d.classList.remove('open'));
    }
  });
})();
</script>
